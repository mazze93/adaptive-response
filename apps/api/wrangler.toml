name                = "adaptive-api"
main                = "src/index.ts"
compatibility_date  = "2024-05-01"
compatibility_flags = ["nodejs_compat"]

# ── Variables ────────────────────────────────────────────────────────────────
# ANTHROPIC_API_KEY must be stored as a secret, never in plaintext:
#   wrangler secret put ANTHROPIC_API_KEY

[vars]
ANTHROPIC_MODEL      = "claude-sonnet-4-6"
# Comma-separated list of allowed origins; "*" for open access
ALLOWED_ORIGINS      = "*"

# ── Rate limiting ─────────────────────────────────────────────────────────────
# 60 requests per 60-second window, keyed on client IP.
# Adjust limit/period before deploying to production.

[[unsafe.bindings]]
name         = "RATE_LIMITER"
type         = "ratelimit"
namespace_id = "1"

[unsafe.bindings.simple]
limit  = 60
period = 60

# ── Development overrides ────────────────────────────────────────────────────
[env.dev]
name = "adaptive-api-dev"

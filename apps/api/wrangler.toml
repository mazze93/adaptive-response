name                = "adaptive-api"
main                = "src/index.ts"
compatibility_date  = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

# ── Variables ────────────────────────────────────────────────────────────────
# ANTHROPIC_API_KEY must be stored as a secret, never in plaintext:
#   wrangler secret put ANTHROPIC_API_KEY

[vars]
ANTHROPIC_MODEL      = "claude-sonnet-4-6"
# Comma-separated allowlist of origins permitted to call the API cross-origin.
# Deny-by-default: empty means no cross-origin access (the Worker omits the
# Access-Control-Allow-Origin header). Set your real front-end origin(s) before
# deploying, e.g. "https://app.example.com,https://demo.example.com".
# NEVER set this to "*" in production — wildcard CORS allows any origin to call
# your API and read the response. There is no valid production use case for it.
ALLOWED_ORIGINS      = ""

# ── Rate limiting ─────────────────────────────────────────────────────────────
# 60 requests per 60-second window, keyed on client IP.
# Adjust limit/period before deploying to production.

[[unsafe.bindings]]
name         = "RATE_LIMITER"
type         = "ratelimit"
namespace_id = "1"

[unsafe.bindings.simple]
limit  = 60
period = 60

# ── Development overrides ────────────────────────────────────────────────────
[env.dev]
name = "adaptive-api-dev"

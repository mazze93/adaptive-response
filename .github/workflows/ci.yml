name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest # GitHub-hosted — never blocked by self-hosted runner
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        # --no-frozen-lockfile so pnpm.overrides resolve without requiring a
        # pre-committed lockfile regeneration (matches security.yml).
        run: pnpm install --no-frozen-lockfile

      - name: Build and typecheck
        # Builds packages/schema→sdk→ui first (typecheck depends on their dist).
        run: pnpm build && pnpm typecheck

      - name: Test
        run: pnpm test
